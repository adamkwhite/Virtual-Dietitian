sonar.projectKey=adamkwhite_Virtual-Dietitian
sonar.organization=adamkwhite
sonar.host.url=https://sonarcloud.io
sonar.python.version=3.12
sonar.python.coverage.reportPaths=cloud-functions/nutrition-analyzer/coverage.xml
sonar.sources=cloud-functions/nutrition-analyzer
sonar.exclusions=**/*test*.py,**/__pycache__/**,htmlcov/**,**/virtual-dietitian-venv/**,**/.pytest_cache/**,notebooks/**
sonar.coverage.exclusions=**/usda_client.py

# Quality gate enforcement
sonar.qualitygate.wait=true

# Exclude python:S5852 (ReDoS vulnerabilities) - personal project with trusted input sources
sonar.issue.ignore.multicriteria.e1.ruleKey=python:S5852
sonar.issue.ignore.multicriteria.e1.resourceKey=**/*.py
